<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Martingale Calculator</title>
<style>
body{
    font-family:Arial,sans-serif;
    max-width:400px;
    margin:30px auto;
    padding:20px;
}
input{
    width:100%;
    padding:8px;
    margin:5px 0 15px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:10px;
}
#result{
    margin-top:20px;
    font-size:18px;
}
</style>
</head>
<body>

<h2>Martingale Calculator</h2>

<label>Saldo</label>
<input type="number" id="balance" value="300" step="0.01">

<label>Multiplier</label>
<input type="number" id="multi" value="2.3" step="0.01">

<label>Tahan Loss</label>
<input type="number" id="losses" value="7">

<button onclick="hitung()">Hitung</button>

<div id="result"></div>

<script>
function hitung() {
    const balance = parseFloat(document.getElementById('balance').value);
    const multi = parseFloat(document.getElementById('multi').value);
    const losses = parseInt(document.getElementById('losses').value);

    const factor = (Math.pow(multi, losses) - 1) / (multi - 1);
    const startBet = balance / factor;
    const percent = (startBet / balance) * 100;

    document.getElementById('result').innerHTML = `
        <b>Start Bet:</b> $${startBet.toFixed(4)}<br>
        <b>Persen Saldo:</b> ${percent.toFixed(4)}%
    `;
}
</script>

</body>
</html>
