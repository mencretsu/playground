<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Token Deployer</title>
    <!-- Ngambil mesin Solana dari internet -->
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; padding: 50px; text-align: center; }
        .container { max-width: 400px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #9945FF; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:hover { background: #14F195; color: black; }
        #status { margin-top: 15px; font-size: 0.9em; color: #14F195; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🛠️ Auto Deployer</h2>
        
        <!-- Tombol Connect Wallet -->
        <button id="connectBtn">🔌 Connect Phantom Wallet</button>
        <p id="walletAddress">Wallet belum nyambung</p>

        <hr style="border-color: #333; margin: 20px 0;">

        <!-- Form Bikin Koin -->
        <input type="text" id="tokenName" placeholder="Nama Koin (Contoh: KoinGue)">
        <input type="text" id="tokenSymbol" placeholder="Simbol (Contoh: KGUE)">
        <input type="number" id="tokenDecimals" value="6" placeholder="Decimals (Default: 6)">
        <input type="number" id="tokenSupply" placeholder="Total Supply (Contoh: 1000000)">
        
        <!-- Tombol Deploy -->
        <button id="deployBtn" disabled style="background: #555; cursor: not-allowed;">🚀 Deploy Sekarang</button>
        
        <p id="status"></p>
    </div>

    <script>
        let wallet = null;

        // Fungsi buat nyambungin web ini ke Phantom Wallet di browser
        document.getElementById('connectBtn').addEventListener('click', async () => {
            if (window.solana && window.solana.isPhantom) {
                try {
                    const resp = await window.solana.connect();
                    wallet = resp.publicKey.toString();
                    document.getElementById('walletAddress').innerText = "Wallet: " + wallet.substring(0, 4) + "..." + wallet.substring(wallet.length - 4);
                    
                    // Nyalain tombol deploy setelah dompet nyambung
                    const deployBtn = document.getElementById('deployBtn');
                    deployBtn.disabled = false;
                    deployBtn.style.background = "#9945FF";
                    deployBtn.style.cursor = "pointer";
                } catch (err) {
                    alert("Lu batalin koneksi dompet!");
                }
            } else {
                alert("Lu belum install extension Phantom Wallet di browser bro!");
            }
        });

        // Fungsi saat tombol Deploy diklik
        document.getElementById('deployBtn').addEventListener('click', async () => {
            const name = document.getElementById('tokenName').value;
            const symbol = document.getElementById('tokenSymbol').value;
            const supply = document.getElementById('tokenSupply').value;

            if(!name || !symbol || !supply) {
                alert("Isi datanya yang bener bro, jangan dikosongin!");
                return;
            }

            document.getElementById('status').innerText = "⏳ Sedang memproses... (Minta Tanda Tangan Phantom)";
            
            // --- BAGIAN INI BUTUH LIBRARY SPL-TOKEN ---
            // Karena ini versi HTML murni pakai CDN, kita simulasiin dulu prosesnya.
            // Di web aslinya, bagian ini bakal nge-trigger pop-up Phantom buat minta bayaran SOL
            
            setTimeout(() => {
                document.getElementById('status').innerText = `✅ SUKSES! ${supply} ${symbol} berhasil dikirim ke dompet lu! (Simulasi)`;
                alert("Boom! Koin lu udah jadi.");
            }, 3000);
        });
    </script>
</body>
</html>
