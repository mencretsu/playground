<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Token Auto-Deployer</title>
    <!-- Tailwind CSS buat tampilan cakep & modern -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Solana Web3 & SPL Token SDK -->
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://unpkg.com/@solana/spl-token@latest/lib/index.iife.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-6 rounded-2xl shadow-xl w-full max-w-md border border-slate-700">
        <h1 class="text-2xl font-bold text-center text-cyan-400 mb-2">🚀 Solana Deployer</h1>
        <p class="text-xs text-slate-400 text-center mb-6">Deploy koin SPL otomatis tanpa coding</p>

        <!-- Status Dompet -->
        <div class="mb-6 p-3 bg-slate-900 rounded-lg border border-slate-700 flex justify-between items-center">
            <span class="text-xs font-semibold text-slate-400">Status Wallet:</span>
            <button id="btnConnect" onclick="connectWallet()" class="text-xs bg-cyan-500 hover:bg-cyan-600 text-slate-900 font-bold py-1.5 px-3 rounded transition">
                Konek Phantom
            </button>
        </div>

        <!-- Form Input -->
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Nama Koin</label>
                <input type="text" id="tokenName" placeholder="Contoh: Rupiah Digital" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-400">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Simbol Koin</label>
                <input type="text" id="tokenSymbol" placeholder="Contoh: IDRD" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-400">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Decimals</label>
                    <input type="number" id="tokenDecimals" value="6" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-400">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Jumlah Supply</label>
                    <input type="number" id="tokenSupply" value="1000000" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-400">
                </div>
            </div>

            <!-- Tombol Eksekusi -->
            <button id="btnDeploy" onclick="deployToken()" disabled class="w-full mt-4 bg-slate-700 text-slate-400 font-bold py-3 rounded-xl cursor-not-allowed transition text-sm uppercase tracking-wider">
                Hubungkan Wallet Dulu
            </button>
        </div>

        <!-- Log Output -->
        <div id="logBox" class="hidden mt-6 p-3 bg-black rounded-lg border border-slate-800 font-mono text-xs text-green-400 max-h-32 overflow-y-auto">
            [System]: Siap deploy...
        </div>
    </div>

    <script>
        let walletAddress = null;
        const connection = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl('mainnet-beta'), 'confirmed');

        // 1. FUNGSI KONEK PHANTOM WALLET
        async function connectWallet() {
            const log = document.getElementById('logBox');
            if ('solana' in window) {
                const provider = window.solana;
                if (provider.isPhantom) {
                    try {
                        const response = await provider.connect();
                        walletAddress = response.publicKey;
                        
                        // Update UI
                        document.getElementById('btnConnect').innerText = walletAddress.toString().slice(0,4) + '...' + walletAddress.toString().slice(-4);
                        document.getElementById('btnConnect').className = "text-xs bg-green-500 text-slate-900 font-bold py-1.5 px-3 rounded pointer-events-none";
                        
                        const btnDeploy = document.getElementById('btnDeploy');
                        btnDeploy.disabled = false;
                        btnDeploy.innerText = "⚡ GAS DEPLOY SEKARANG";
                        btnDeploy.className = "w-full mt-4 bg-gradient-to-r from-cyan-400 to-blue-500 hover:from-cyan-500 hover:to-blue-600 text-slate-950 font-bold py-3 rounded-xl transition text-sm uppercase tracking-wider shadow-lg shadow-cyan-500/20 cursor-pointer";
                        
                        log.classList.remove('hidden');
                        log.innerHTML += `<br>[Wallet]: Terhubung (${walletAddress.toString()})`;
                    } catch (err) {
                        alert("Koneksi dibatalkan user.");
                    }
                }
            } else {
                alert("Phantom Wallet gak ketemu, bro. Pakai browser crypto (Dapp Browser) atau instal ekstensinya dulu.");
            }
        }

        // 2. FUNGSI UTAMA DEPLOY KOIN (MINTING)
        async function deployToken() {
            const log = document.getElementById('logBox');
            if(!walletAddress) return;

            const name = document.getElementById('tokenName').value;
            const symbol = document.getElementById('tokenSymbol').value;
            const decimals = parseInt(document.getElementById('tokenDecimals').value);
            const supply = parseInt(document.getElementById('tokenSupply').value);

            if(!name || !symbol) {
                alert("Nama dan Simbol koin isi dulu cok!");
                return;
            }

            log.innerHTML += `<br>[Proses]: Membuat Mint Account...`;
            
            try {
                // Generate kunci baru buat token address-nya
                const mintKeypair = solanaWeb3.Keypair.generate();
                const payer = window.solana;

                // Hitung biaya sewa minimal (Rent Exempt) di Solana
                const lamports = await splToken.Token.getMinBalanceRentForExemptMint(connection);

                // Buat instruksi transaksi membuat akun baru untuk token
                const createAccountIx = solanaWeb3.SystemProgram.createAccount({
                    fromPubkey: walletAddress,
                    newAccountPubkey: mintKeypair.publicKey,
                    space: splToken.MINT_SIZE,
                    lamports,
                    programId: splToken.TOKEN_PROGRAM_ID,
                });

                // Inisialisasi akun tersebut sebagai Token Mint
                const initializeMintIx = splToken.Token.createInitMintInstruction(
                    splToken.TOKEN_PROGRAM_ID,
                    mintKeypair.publicKey,
                    decimals,
                    walletAddress, // Mint Authority (Kamu pemiliknya)
                    walletAddress  // Freeze Authority
                );

                // Cari/Buat Associated Token Account (Kantong koin di walletmu)
                const ata = await splToken.Token.getAssociatedTokenAddress(
                    splToken.ASSOCIATED_TOKEN_PROGRAM_ID,
                    splToken.TOKEN_PROGRAM_ID,
                    mintKeypair.publicKey,
                    walletAddress
                );

                const createAtaIx = splToken.Token.createAssociatedTokenAccountInstruction(
                    splToken.ASSOCIATED_TOKEN_PROGRAM_ID,
                    splToken.TOKEN_PROGRAM_ID,
                    mintKeypair.publicKey,
                    ata,
                    walletAddress,
                    walletAddress
                );

                // Cetak supply koinnya langsung ke kantongmu
                const mintToIx = splToken.Token.createMintToInstruction(
                    splToken.TOKEN_PROGRAM_ID,
                    mintKeypair.publicKey,
                    ata,
                    walletAddress,
                    [],
                    supply * Math.pow(10, decimals)
                );

                // Gabungkan semua instruksi ke dalam satu paket transaksi
                let transaction = new solanaWeb3.Transaction()
                    .add(createAccountIx, initializeMintIx, createAtaIx, mintToIx);
                
                transaction.feePayer = walletAddress;
                let blockhashObj = await connection.getRecentBlockhash();
                transaction.recentBlockhash = blockhashObj.blockhash;

                // Tanda tangan parsial oleh kunci koin baru
                transaction.partialSign(mintKeypair);

                log.innerHTML += `<br>[Wallet]: Konfirmasi transaksi di Phantom...`;

                // Minta konfirmasi signature dari Phantom milikmu
                let signedTx = await payer.signTransaction(transaction);
                let txId = await connection.sendRawTransaction(signedTx.serialize());
                
                log.innerHTML += `<br>[Proses]: Menunggu konfirmasi Blockchain...`;
                await connection.confirmTransaction(txId);

                log.innerHTML += `<br><span class="text-yellow-400">[SUKSES]: Koin berhasil dideploy!</span>`;
                log.innerHTML += `<br>[Mint Address]: <span class="text-white font-bold">${mintKeypair.publicKey.toString()}</span>`;
                log.innerHTML += `<br>[Tx ID]: <a href="https://solscan.io/tx/${txId}" target="_blank" class="underline text-cyan-400">Cek di Solscan</a>`;

            } catch (error) {
                console.error(error);
                log.innerHTML += `<br><span class="text-red-500">[ERROR]: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
