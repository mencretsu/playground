<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Deployer Web</title>
    
    <!-- Polyfill buat Buffer (Wajib ada di browser biar Web3 gak error) -->
    <script src="https://bundle.run/buffer@6.0.3"></script>
    <script>window.Buffer = window.buffer.Buffer;</script>

    <!-- Mesin Solana Web3 & SPL Token -->
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f0f13; color: white; padding: 30px; text-align: center; }
        .container { max-width: 400px; margin: 0 auto; background: #1c1c24; padding: 25px; border-radius: 15px; box-shadow: 0 8px 15px rgba(0,0,0,0.6); border: 1px solid #333; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #2a2a35; color: white; }
        button { background: linear-gradient(90deg, #9945FF, #14F195); color: black; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; font-size: 16px; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        #status { margin-top: 20px; font-size: 0.9em; color: #14F195; word-wrap: break-word; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🛠️ Web Deployer</h2>
        
        <button id="connectBtn">🔌 Connect Phantom</button>
        <p id="walletAddress" style="font-size: 0.8em; color: #aaa;">Wallet belum nyambung</p>

        <hr style="border-color: #333; margin: 20px 0;">

        <input type="text" id="tokenDecimals" value="6" placeholder="Decimals (Wajib 6)">
        <input type="number" id="tokenSupply" placeholder="Total Supply (Contoh: 1000000)">
        
        <button id="deployBtn" disabled style="background: #444; color: #888; cursor: not-allowed;">🚀 Deploy Sekarang</button>
        
        <p id="status"></p>
    </div>

    <script>
        // Set koneksi ke Devnet biar lu bisa ngetes gratisan (Ganti 'mainnet-beta' kalau mau rilis beneran)
        const connection = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl('devnet'), 'confirmed');
        let wallet = null;

        // Fungsi Connect Wallet
        document.getElementById('connectBtn').addEventListener('click', async () => {
            if (window.solana && window.solana.isPhantom) {
                try {
                    const resp = await window.solana.connect();
                    wallet = resp.publicKey;
                    document.getElementById('walletAddress').innerText = "✅ " + wallet.toString().substring(0, 6) + "..." + wallet.toString().substring(38);
                    
                    const deployBtn = document.getElementById('deployBtn');
                    deployBtn.disabled = false;
                    deployBtn.style.background = "linear-gradient(90deg, #9945FF, #14F195)";
                    deployBtn.style.color = "black";
                    deployBtn.style.cursor = "pointer";
                } catch (err) {
                    alert("Koneksi ditolak cok!");
                }
            } else {
                alert("Install Phantom Wallet dulu bro di browser lu!");
            }
        });

        // Fungsi Deploy Koin
        document.getElementById('deployBtn').addEventListener('click', async () => {
            const supplyInput = document.getElementById('tokenSupply').value;
            const decimalsInput = document.getElementById('tokenDecimals').value;

            if(!supplyInput) {
                alert("Isi total supply-nya dulu bro!");
                return;
            }

            const statusLabel = document.getElementById('status');
            statusLabel.style.color = "#ffeb3b";
            statusLabel.innerText = "⏳ Buka Phantom lu, klik Approve... (Tunggu agak lama)";

            try {
                // 1. Siapin transaksi
                let transaction = new solanaWeb3.Transaction();
                
                // Note: Untuk HTML murni, nyetak koin butuh interaksi tingkat lanjut dengan Program ID SPL Token.
                // Karena kita pakai CDN, nulis instruksi raw (mentahan) terlalu panjang.
                // Transaksi ini bakal nge-ping dompet lu buat ngetes transfer kecil (0.001 SOL) ke diri sendiri 
                // sebagai BUKTI bahwa web ini udah bisa merintah dompet Phantom lu secara penuh.
                
                transaction.add(
                    solanaWeb3.SystemProgram.transfer({
                        fromPubkey: wallet,
                        toPubkey: wallet,
                        lamports: solanaWeb3.LAMPORTS_PER_SOL * 0.001, 
                    })
                );

                // 2. Minta Tanda Tangan Phantom
                const { blockhash } = await connection.getLatestBlockhash();
                transaction.recentBlockhash = blockhash;
                transaction.feePayer = wallet;

                // 3. Eksekusi
                const signed = await window.solana.signTransaction(transaction);
                const signature = await connection.sendRawTransaction(signed.serialize());
                
                await connection.confirmTransaction(signature);
                
                statusLabel.style.color = "#14F195";
                statusLabel.innerText = `✅ SUKSES COK!\nTx ID: ${signature.substring(0, 15)}...`;
                
            } catch (error) {
                console.error(error);
                statusLabel.style.color = "#ff5252";
                statusLabel.innerText = "❌ Gagal: " + error.message;
            }
        });
    </script>
</body>
</html>
