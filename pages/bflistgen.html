<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Password Combiner</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    padding:15px;
}

h2{
    text-align:center;
}

textarea{
    width:100%;
    height:120px;
    background:#1e1e1e;
    color:#00ff88;
    border:none;
    border-radius:10px;
    padding:10px;
    font-size:14px;
    box-sizing:border-box;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    background:#00cc66;
    color:white;
    font-size:16px;
    font-weight:bold;
}

#count{
    margin-top:10px;
    opacity:0.8;
}
</style>
</head>
<body>

<h2>bf list Generator</h2>

<input id="words" value="beater,beaterzt,13,62412">
<input id="max" type="number" value="4" min="2" max="6">

<button onclick="generate()">Generate</button>

<div id="count"></div>

<textarea id="output" placeholder="hasil muncul di sini..."></textarea>

<script>
function permute(arr, len) {
    let result = [];

    function backtrack(path) {
        if(path.length === len){
            result.push([...path]);
            return;
        }

        for(let item of arr){
            path.push(item);
            backtrack(path);
            path.pop();
        }
    }

    backtrack([]);
    return result;
}

function generate(){
    const words = document.getElementById("words")
        .value
        .split(",")
        .map(v => v.trim())
        .filter(v => v);

    const max = parseInt(document.getElementById("max").value);

    let finalSet = new Set();

    for(let i=2;i<=max;i++){
        let combos = permute(words, i);

        combos.forEach(c=>{
            finalSet.add(c.join(""));

            // tambahan variasi
            finalSet.add(c.join("_"));
            finalSet.add(c.join("-"));
        });
    }

    let final = Array.from(finalSet);

    document.getElementById("count").innerText =
        "Total password: " + final.length;

    document.getElementById("output").value =
        final.join("\n");
}
</script>

</body>
</html>
