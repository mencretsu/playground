<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Martingale Calc</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0 }
  body { background: #0b0e13; color: #e0e0e0; font-family: 'Courier New', monospace; padding: 32px 24px; min-height: 100vh }
  h1 { font-size: 14px; letter-spacing: 4px; text-transform: uppercase; color: #444; margin-bottom: 32px }

  .inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px }
  .inp-wrap { display: flex; flex-direction: column; gap: 6px }
  label { font-size: 11px; letter-spacing: 2px; color: #555; text-transform: uppercase }
  input {
    background: #131720; border: 1px solid #1e2530; color: #e0e0e0;
    font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold;
    padding: 10px 12px; border-radius: 4px; width: 100%; outline: none;
    transition: border-color .15s
  }
  input:focus { border-color: #00ff94 }

  .meta { display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap }
  .meta-item { font-size: 12px; color: #555 }
  .meta-item span { color: #e0e0e0 }
  .be-badge { font-size: 11px; padding: 2px 8px; border-radius: 3px; letter-spacing: 1px }
  .ok  { background: #0a2e1a; color: #00ff94; border: 1px solid #00ff9433 }
  .bad { background: #2e0a0a; color: #ff4444; border: 1px solid #ff444433 }

  table { width: 100%; border-collapse: collapse }
  th { font-size: 10px; letter-spacing: 2px; color: #444; text-align: right; padding: 8px 12px; border-bottom: 1px solid #1a1f28; text-transform: uppercase }
  th:first-child { text-align: left }
  td { padding: 10px 12px; text-align: right; border-bottom: 1px solid #111519; font-size: 14px }
  td:first-child { text-align: left; color: #555; font-size: 12px; letter-spacing: 1px }
  tr:hover td { background: #0f1318 }
  .pos { color: #00ff94 }
  .neg { color: #ff4444 }
  .dim td { opacity: .35 }
  .cap-tag { font-size: 9px; background: #2a1e00; color: #f90; border-radius: 3px; padding: 1px 5px; margin-left: 6px; letter-spacing: 1px }
</style>
</head>
<body>

<h1>Martingale Calc</h1>

<div class="inputs">
  <div class="inp-wrap"><label>Balance ($)</label><input type="number" id="bal" value="500" step="10"></div>
  <div class="inp-wrap"><label>Margin ratio (%)</label><input type="number" id="mr" value="1" step="0.1"></div>
  <div class="inp-wrap"><label>Multiplier (x)</label><input type="number" id="mult" value="2.3" step="0.1"></div>
  <div class="inp-wrap"><label>SL (%)</label><input type="number" id="sl" value="0.5" step="0.1"></div>
  <div class="inp-wrap"><label>TP (%)</label><input type="number" id="tp" value="1" step="0.1"></div>
  <div class="inp-wrap"><label>Cap (%)</label><input type="number" id="cap" value="80" step="5"></div>
</div>

<div class="meta" id="meta"></div>

<table>
  <thead>
    <tr>
      <th>Level</th>
      <th>Margin ($)</th>
      <th>% balance</th>
      <th>Profit (TP)</th>
      <th>Acc. loss</th>
      <th>Net if win</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>
function run() {
  const bal  = +document.getElementById('bal').value  || 500
  const mr   = +document.getElementById('mr').value   / 100 || 0.01
  const mult = +document.getElementById('mult').value || 2.3
  const sl   = +document.getElementById('sl').value   / 100 || 0.005
  const tp   = +document.getElementById('tp').value   / 100 || 0.01
  const cap  = +document.getElementById('cap').value  / 100 || 0.8
  const lev  = 10

  const capAmt = bal * cap
  const baseM  = bal * mr
  const beMin  = 1 + sl / tp
  const above  = mult >= beMin

  document.getElementById('meta').innerHTML = `
    <div class="meta-item">base margin: <span>$${baseM.toFixed(2)}</span></div>
    <div class="meta-item">base profit: <span>$${(baseM * lev * tp).toFixed(2)}</span></div>
    <div class="meta-item">cap limit: <span>$${capAmt.toFixed(0)}</span></div>
    <div class="meta-item">break-even: <span>${beMin.toFixed(2)}x</span>
      &nbsp;<span class="be-badge ${above ? 'ok' : 'bad'}">${above ? 'AMAN' : 'BAHAYA'}</span>
    </div>
  `

  let acc    = 0
  let margin = baseM
  let rows   = ''
  let capped = false
  let capLvl = null

  for (let lvl = 0; lvl <= 20; lvl++) {
    const hitCap = margin >= capAmt
    if (hitCap && !capped) { capped = true; capLvl = lvl }

    const profit = margin * lev * tp
    const net    = profit - acc
    const netStr = (net >= 0 ? '+' : '') + '$' + Math.abs(net).toFixed(2)
    const capTag = hitCap ? '<span class="cap-tag">CAP</span>' : ''
    const dimCls = capped && lvl > capLvl ? ' class="dim"' : ''

    rows += `<tr${dimCls}>
      <td>L${lvl}${capTag}</td>
      <td>$${margin.toFixed(2)}</td>
      <td>${((margin / bal) * 100).toFixed(1)}%</td>
      <td>$${profit.toFixed(2)}</td>
      <td>$${acc.toFixed(2)}</td>
      <td class="${net >= 0 ? 'pos' : 'neg'}">${netStr}</td>
    </tr>`

    acc += margin * lev * sl
    margin = Math.min(margin * mult, capAmt)

    if (capped && lvl >= capLvl + 2) break
  }

  document.getElementById('tbody').innerHTML = rows
}

document.querySelectorAll('input').forEach(el => el.addEventListener('input', run))
run()
</script>

</body>
</html>
